  <!-- Top label -->
  <text x="80" y="120" font-family="Arial Black, sans-serif" font-size="13" font-weight="700" letter-spacing="4" fill="#c8ff00" opacity="0.9">TANK.COMPANY</text>

  <!-- Divider line accent -->
  <rect x="80" y="138" width="60" height="2" fill="#c8ff00"/>

  <!-- Main headline -->
  <text x="80" y="260" font-family="Arial Black, sans-serif" font-size="88" font-weight="900" fill="#f4f0eb" letter-spacing="-2">BUILD LEAN</text>
  <text x="80" y="360" font-family="Arial Black, sans-serif" font-size="88" font-weight="900" fill="#c8ff00" letter-spacing="-2">MUSCLE.</text>
  <text x="80" y="455" font-family="Arial Black, sans-serif" font-size="88" font-weight="900" fill="#f4f0eb" letter-spacing="-2">CONSISTENTLY.</text>

  <!-- Subline -->
  <text x="82" y="520" font-family="Arial, sans-serif" font-size="22" font-weight="400" fill="#888888">The Tank Protocol V1 — Liquid Nutrition System</text>

  <!-- Bottom right pill -->
  <rect x="940" y="560" width="180" height="40" rx="20" fill="#c8ff00"/>
  <text x="1030" y="585" font-family="Arial Black, sans-serif" font-size="14" font-weight="700" fill="#000" text-anchor="middle" letter-spacing="1">BUY NOW →</text>

  <!-- Corner dots decoration -->
  <circle cx="1150" cy="80" r="4" fill="#c8ff00" opacity="0.6"/>
  <circle cx="1130" cy="80" r="2" fill="#c8ff00" opacity="0.3"/>
  <circle cx="1150" cy="100" r="2" fill="#c8ff00" opacity="0.3"/>
</svg>
